services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-template_django_nuxt}
      POSTGRES_USER: ${POSTGRES_USER:-template_django_nuxt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-template_django_nuxt}
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
  
  createbucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/media --ignore-existing;
      mc anonymous set public local/media;
      exit 0;
      "
  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - minio
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings.dev
      DJANGO_SECRET_KEY: django-insecure-dev-key-change-in-production
      POSTGRES_DB: ${POSTGRES_DB:-template_django_nuxt}
      POSTGRES_USER: ${POSTGRES_USER:-template_django_nuxt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-template_django_nuxt}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-media}
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_CUSTOM_DOMAIN: localhost/media
      WAGTAILADMIN_BASE_URL: http://localhost
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: admin
      DJANGO_SUPERUSER_EMAIL: admin@localhost

    command: >
      sh -c "python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             python manage.py createsuperuser --noinput || true &&
             python manage.py runserver 0.0.0.0:8000"
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NUXT_API_BASE_SERVER: http://backend:8000/api
      NUXT_PUBLIC_API_BASE: /api
    depends_on:
      - backend
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
      - minio

volumes:
  postgres_data:
  minio_data: